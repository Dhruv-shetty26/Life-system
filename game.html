<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shadow Dungeon — Solo Leveling</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#030010;overflow:hidden;margin:0;padding:0;}
  #game-container{position:fixed;inset:0;width:100vw;height:100vh;}
  #hud{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;padding:8px 12px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px;}
  .hud-block{background:rgba(0,0,0,0.75);border:1px solid rgba(123,47,255,0.5);padding:4px 10px;border-radius:3px;}
  .hud-label{font-size:8px;color:#5a3a8a;letter-spacing:1px;text-transform:uppercase;font-family:monospace;}
  .hud-val{font-size:16px;font-weight:700;color:#cc88ff;font-family:monospace;}
  #hp-bar-wrap{position:fixed;top:52px;left:12px;right:12px;z-index:10;pointer-events:none;}
  .bar-label{font-size:9px;color:#888;font-family:monospace;letter-spacing:1px;margin-bottom:2px;}
  .bar-bg{background:rgba(0,0,0,0.6);border:1px solid rgba(255,51,102,0.4);height:10px;border-radius:2px;overflow:hidden;}
  .bar-fill{height:100%;transition:width 0.2s;border-radius:2px;}
  #hp-fill{background:linear-gradient(90deg,#cc0033,#ff3366);width:100%;}
  #mp-fill{background:linear-gradient(90deg,#4400cc,#9933ff);width:100%;}
  #skills-hud{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;pointer-events:all;}
  .skill-btn{width:52px;height:52px;border:2px solid #7b2fff;background:rgba(40,0,80,0.85);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;position:relative;-webkit-tap-highlight-color:transparent;}
  .skill-btn:active{transform:scale(0.92);background:rgba(80,0,160,0.9);}
  .skill-btn.cd{opacity:0.45;pointer-events:none;}
  .skill-btn .sk-icon{font-size:22px;line-height:1;}
  .skill-btn .sk-key{font-size:8px;color:#aa77ff;font-family:monospace;letter-spacing:1px;}
  .skill-btn .cd-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.6);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-family:monospace;font-weight:700;}
  #mobile-controls{position:fixed;bottom:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:flex-end;padding:8px;pointer-events:none;}
  .dpad{display:flex;gap:4px;pointer-events:all;}
  .ctrl-btn{width:52px;height:52px;border:1px solid rgba(123,47,255,0.6);background:rgba(20,0,40,0.8);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;}
  .ctrl-btn:active{background:rgba(80,0,160,0.9);transform:scale(0.92);}
  #attack-btn{width:60px;height:60px;border:2px solid #00aaff;background:rgba(0,40,100,0.85);font-size:26px;}
  #msg-overlay{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  #msg-box{background:rgba(5,0,20,0.96);border:1px solid #7b2fff;box-shadow:0 0 40px rgba(123,47,255,0.5);padding:30px 40px;text-align:center;max-width:420px;width:90%;pointer-events:all;display:none;}
  #msg-title{font-size:28px;font-weight:900;color:#cc88ff;letter-spacing:3px;margin-bottom:8px;font-family:monospace;}
  #msg-sub{font-size:12px;color:#7755aa;letter-spacing:1px;margin-bottom:16px;font-family:monospace;line-height:1.7;white-space:pre-line;}
  #msg-btn{padding:12px 28px;border:1px solid #7b2fff;background:rgba(60,0,120,0.8);color:#cc88ff;font-family:monospace;font-size:13px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:all 0.2s;}
  #msg-btn:hover{background:rgba(100,0,200,0.9);box-shadow:0 0 15px rgba(123,47,255,0.4);}
  #floor-announce{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:15;pointer-events:none;text-align:center;opacity:0;transition:opacity 0.4s;}
  #floor-title{font-size:32px;font-weight:900;color:#ffd700;font-family:monospace;letter-spacing:4px;text-shadow:0 0 30px #ffd700;}
  #floor-sub{font-size:14px;color:#cc88ff;font-family:monospace;letter-spacing:2px;margin-top:6px;}
  canvas{display:block;}
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
</style>
</head>
<body>
<div id="game-container">
  <!-- HUD -->
  <div id="hud">
    <div class="hud-block"><div class="hud-label">Floor</div><div class="hud-val" id="h-floor">1</div></div>
    <div class="hud-block"><div class="hud-label">Score</div><div class="hud-val" id="h-score">0</div></div>
    <div class="hud-block"><div class="hud-label">Kills</div><div class="hud-val" id="h-kills">0</div></div>
    <div class="hud-block"><div class="hud-label">💎</div><div class="hud-val" id="h-crystals">0</div></div>
    <div class="hud-block"><div class="hud-label">Soldiers</div><div class="hud-val" id="h-soldiers">0/3</div></div>
  </div>
  <div id="hp-bar-wrap">
    <div class="bar-label">❤ HP</div>
    <div class="bar-bg"><div class="bar-fill" id="hp-fill"></div></div>
    <div class="bar-label" style="margin-top:4px;">⚡ MANA</div>
    <div class="bar-bg"><div class="bar-fill" id="mp-fill"></div></div>
  </div>

  <!-- Skills -->
  <div id="skills-hud">
    <div class="skill-btn" id="sk1" onclick="triggerSkill(1)">
      <div class="sk-icon">⚡</div>
      <div class="sk-key">Q·STRIKE</div>
      <div class="cd-overlay" id="sk1-cd" style="display:none;"></div>
    </div>
    <div class="skill-btn" id="sk2" onclick="triggerSkill(2)">
      <div class="sk-icon">☠</div>
      <div class="sk-key">E·ARISE</div>
      <div class="cd-overlay" id="sk2-cd" style="display:none;"></div>
    </div>
    <div class="skill-btn" id="sk3" onclick="triggerSkill(3)">
      <div class="sk-icon">🛡</div>
      <div class="sk-key">R·SHIELD</div>
      <div class="cd-overlay" id="sk3-cd" style="display:none;"></div>
    </div>
  </div>

  <!-- Mobile controls -->
  <div id="mobile-controls">
    <div class="dpad">
      <div class="ctrl-btn" id="btn-left" ontouchstart="mobileKey('left',true)" ontouchend="mobileKey('left',false)">◀</div>
      <div style="display:flex;flex-direction:column;gap:4px;">
        <div class="ctrl-btn" id="btn-up" ontouchstart="mobileKey('up',true)" ontouchend="mobileKey('up',false)">▲</div>
        <div class="ctrl-btn" id="btn-down" style="opacity:0;pointer-events:none;">▼</div>
      </div>
      <div class="ctrl-btn" id="btn-right" ontouchstart="mobileKey('right',true)" ontouchend="mobileKey('right',false)">▶</div>
    </div>
    <div class="ctrl-btn" id="attack-btn" ontouchstart="mobileAttack()" style="border-color:#00aaff;">⚔</div>
  </div>

  <!-- Message overlay -->
  <div id="msg-overlay">
    <div id="msg-box">
      <div id="msg-title">SHADOW DUNGEON</div>
      <div id="msg-sub"></div>
      <button id="msg-btn" onclick="msgAction()">▶ BEGIN</button>
    </div>
  </div>

  <!-- Floor announce -->
  <div id="floor-announce">
    <div id="floor-title">FLOOR 1</div>
    <div id="floor-sub">ARISE FROM THE SHADOW</div>
  </div>
</div>

<script>
// ====== GAME CONFIG ======
const W = window.innerWidth;
const H = window.innerHeight;

const config = {
  type: Phaser.AUTO,
  width: W,
  height: H,
  parent: 'game-container',
  backgroundColor: '#030010',
  scale: {
    mode: Phaser.Scale.RESIZE,
    autoCenter: Phaser.Scale.CENTER_BOTH,
  },
  physics: {
    default: 'arcade',
    arcade: { gravity: { y: 800 }, debug: false }
  },
  scene: [BootScene, GameScene]
};

// ====== GLOBAL STATE ======
let gGame, gScene;
let gFloor=1, gScore=0, gKills=0, gCrystals=0;
let gHP=100, gMaxHP=100, gMP=100, gMaxMP=100;
let gSoldiers=[], gMaxSoldiers=3;
let gSk1CD=0, gSk2CD=0, gSk3CD=0;
let gMsgAction=null;
let gKeys={};
let gMobileKeys={left:false,right:false,up:false};

function mobileKey(k,v){ gMobileKeys[k]=v; }
function mobileAttack(){ if(gScene) gScene.doAttack(); }
function triggerSkill(n){ if(gScene) gScene.useSkill(n); }

// ====== BOOT SCENE ======
class BootScene extends Phaser.Scene {
  constructor(){ super('Boot'); }
  create(){
    // Generate all graphics procedurally
    this.generateTextures();
    this.scene.start('Game');
  }

  generateTextures(){
    // PLAYER texture (32x48)
    let g = this.make.graphics({x:0,y:0,add:false});
    // Coat
    g.fillStyle(0x070e1f); g.fillRect(4,14,24,28);
    // Coat glow edge
    g.lineStyle(1,0x1a3a6a); g.strokeRect(4,14,24,28);
    // Belt
    g.fillStyle(0x1a1a2e); g.fillRect(5,34,22,4);
    // Legs
    g.fillStyle(0x080f20); g.fillRect(5,38,9,10); g.fillRect(18,38,9,10);
    // Boots
    g.fillStyle(0x1a2244); g.fillRect(5,44,9,4); g.fillRect(18,44,9,4);
    // Head
    g.fillStyle(0xe8c4a0); g.fillCircle(16,8,8);
    // Hair
    g.fillStyle(0x1a0a0a);
    g.fillTriangle(8,6,4,0,10,4);
    g.fillTriangle(24,6,28,0,22,4);
    g.fillRect(8,2,16,6);
    // Eyes (glowing blue)
    g.fillStyle(0x00d4ff); g.fillRect(19,7,5,3);
    // Sword handle
    g.fillStyle(0x334466); g.fillRect(28,18,4,6);
    // Blade
    g.lineStyle(2,0x336699); g.lineBetween(30,18,30,4);
    g.generateTexture('player',32,48);
    g.destroy();

    // PLAYER ATTACK texture
    g = this.make.graphics({x:0,y:0,add:false});
    g.fillStyle(0x070e1f); g.fillRect(4,14,24,28);
    g.lineStyle(1,0x1a3a6a); g.strokeRect(4,14,24,28);
    g.fillStyle(0x1a1a2e); g.fillRect(5,34,22,4);
    g.fillStyle(0x080f20); g.fillRect(5,38,9,10); g.fillRect(18,38,9,10);
    g.fillStyle(0xe8c4a0); g.fillCircle(16,8,8);
    g.fillStyle(0x1a0a0a); g.fillRect(8,2,16,6);
    g.fillStyle(0x00d4ff); g.fillRect(19,7,5,3);
    // Extended sword attack
    g.lineStyle(3,0x88ccff); g.lineBetween(28,20,58,12);
    g.lineStyle(1,0x00d4ff); g.lineBetween(28,19,58,11);
    // Arc effects
    g.lineStyle(2,0x00aaff,0.6);
    g.strokeCircle(45,18,12);
    g.generateTexture('player_attack',64,48);
    g.destroy();

    // ENEMY GRUNT texture (28x36)
    g = this.make.graphics({x:0,y:0,add:false});
    g.fillStyle(0x220055); g.fillRect(4,10,20,20);
    g.lineStyle(2,0x9933ff); g.strokeRect(4,10,20,20);
    // Robe
    g.fillStyle(0x110033);
    g.fillTriangle(4,30,14,36,24,30);
    // Head
    g.fillStyle(0x330066); g.fillCircle(14,7,7);
    g.lineStyle(1,0x7722cc); g.strokeCircle(14,7,7);
    // Eyes
    g.fillStyle(0xff2255); g.fillCircle(10,7,3); g.fillCircle(18,7,3);
    g.fillStyle(0xff8888); g.fillCircle(10,6,1); g.fillCircle(18,6,1);
    // Arms
    g.lineStyle(3,0x7722cc); g.lineBetween(4,16,0,24); g.lineBetween(24,16,28,24);
    g.fillStyle(0x9933ff); g.fillCircle(0,24,4); g.fillCircle(28,24,4);
    g.generateTexture('enemy_grunt',28,36);
    g.destroy();

    // ENEMY HEAVY texture (40x52)
    g = this.make.graphics({x:0,y:0,add:false});
    // Armor body
    g.fillStyle(0x0a0020); g.fillRect(4,14,32,32);
    g.lineStyle(2,0x660099); g.strokeRect(4,14,32,32);
    // Chest plate
    g.fillStyle(0x160030); g.fillRect(8,16,24,16);
    g.lineStyle(1,0x9900cc); g.strokeRect(8,16,24,16);
    // Helmet
    g.fillStyle(0x0a0020); g.fillCircle(20,9,10);
    g.lineStyle(2,0x660099); g.strokeCircle(20,9,10);
    // Visor
    g.fillStyle(0xff00ff); g.fillRect(11,7,18,4);
    // Legs
    g.fillStyle(0x080018); g.fillRect(6,42,14,10); g.fillRect(22,42,14,10);
    // Axe
    g.fillStyle(0x1a0030); g.fillRect(36,18,8,4);
    g.fillStyle(0x330055); g.fillRect(40,14,6,14);
    g.lineStyle(1,0xcc00ff); g.strokeRect(40,14,6,14);
    g.generateTexture('enemy_heavy',48,52);
    g.destroy();

    // ENEMY ELITE texture (30x42)
    g = this.make.graphics({x:0,y:0,add:false});
    g.fillStyle(0x110011);
    g.fillTriangle(15,0,30,14,26,42,4,42,0,14);
    g.lineStyle(2,0xff0044); g.strokeTriangle(15,0,30,14,26,42,4,42,0,14);
    // Head
    g.fillStyle(0x220011); g.fillCircle(15,8,8);
    g.lineStyle(1,0xff0044); g.strokeCircle(15,8,8);
    // 3 eyes
    g.fillStyle(0xff0000);
    g.fillCircle(8,8,2.5); g.fillCircle(15,8,2.5); g.fillCircle(22,8,2.5);
    // Dual daggers
    g.lineStyle(2,0xff3366); g.lineBetween(-4,16,8,8); g.lineBetween(34,16,22,8);
    g.generateTexture('enemy_elite',32,42);
    g.destroy();

    // SHADOW SOLDIER texture (20x30)
    g = this.make.graphics({x:0,y:0,add:false});
    g.fillStyle(0x0a0010); g.fillRect(0,0,20,30);
    g.lineStyle(2,0xcc00ff); g.strokeRect(0,0,20,30);
    g.fillStyle(0xff00ff); g.fillRect(4,6,4,4); g.fillRect(12,6,4,4);
    g.generateTexture('soldier',20,30);
    g.destroy();

    // CRYSTAL drop
    g = this.make.graphics({x:0,y:0,add:false});
    g.fillStyle(0x0088cc);
    g.fillTriangle(8,0,14,8,8,16,2,8);
    g.fillStyle(0x00d4ff,0.7);
    g.fillTriangle(8,0,11,6,8,10,5,6);
    g.generateTexture('crystal',16,16);
    g.destroy();

    // HP drop
    g = this.make.graphics({x:0,y:0,add:false});
    g.fillStyle(0xcc0033);
    g.fillCircle(6,5,5); g.fillCircle(12,5,5);
    g.fillTriangle(0,6,18,6,9,16);
    g.fillStyle(0xff6688,0.5);
    g.fillCircle(5,4,3);
    g.generateTexture('hpdrop',18,16);
    g.destroy();

    // PLATFORM tile
    g = this.make.graphics({x:0,y:0,add:false});
    g.fillStyle(0x0e0030); g.fillRect(0,0,64,20);
    g.lineStyle(1,0x3c1464,0.5); g.strokeRect(0,0,64,20);
    g.lineStyle(2,0x7b2fff); g.lineBetween(0,0,64,0);
    // Rune mark
    g.lineStyle(1,0x3a1080,0.4); g.strokeCircle(32,12,6);
    g.generateTexture('platform',64,20);
    g.destroy();

    // GROUND tile
    g = this.make.graphics({x:0,y:0,add:false});
    g.fillStyle(0x080020); g.fillRect(0,0,64,32);
    g.lineStyle(1,0x2a0860,0.4);
    g.lineBetween(0,0,64,0); g.lineBetween(0,16,64,16);
    g.lineBetween(32,0,32,32);
    g.generateTexture('ground',64,32);
    g.destroy();

    // PARTICLE - slash
    g = this.make.graphics({x:0,y:0,add:false});
    g.fillStyle(0x00d4ff,0.9); g.fillCircle(4,4,4);
    g.generateTexture('particle_blue',8,8);
    g.destroy();

    g = this.make.graphics({x:0,y:0,add:false});
    g.fillStyle(0x9933ff,0.9); g.fillCircle(4,4,4);
    g.generateTexture('particle_purple',8,8);
    g.destroy();

    g = this.make.graphics({x:0,y:0,add:false});
    g.fillStyle(0xff3366,0.9); g.fillCircle(4,4,4);
    g.generateTexture('particle_red',8,8);
    g.destroy();

    g = this.make.graphics({x:0,y:0,add:false});
    g.fillStyle(0xffd700,0.9); g.fillCircle(4,4,4);
    g.generateTexture('particle_gold',8,8);
    g.destroy();

    // BOSS texture (60x70)
    g = this.make.graphics({x:0,y:0,add:false});
    g.fillStyle(0x1a0000);
    g.fillRect(10,16,40,46);
    g.lineStyle(3,0xff0000); g.strokeRect(10,16,40,46);
    // Spikes on top
    g.fillStyle(0x2a0000);
    for(let i=0;i<5;i++) g.fillTriangle(12+i*10,16,17+i*10,0,22+i*10,16);
    // Head
    g.fillStyle(0x220000); g.fillCircle(30,10,12);
    g.lineStyle(2,0xff0000); g.strokeCircle(30,10,12);
    // Eyes - 4 red eyes
    g.fillStyle(0xff0000);
    g.fillCircle(22,10,4); g.fillCircle(30,10,4); g.fillCircle(38,10,4);
    g.fillStyle(0xff6600); g.fillCircle(22,9,2); g.fillCircle(30,9,2); g.fillCircle(38,9,2);
    // Arms
    g.lineStyle(5,0x660000); g.lineBetween(10,28,0,44); g.lineBetween(50,28,60,44);
    g.fillStyle(0xff0000); g.fillCircle(0,44,8); g.fillCircle(60,44,8);
    // Chest rune
    g.lineStyle(1,0xff4400,0.8); g.strokeCircle(30,36,10);
    g.lineBetween(30,26,30,46); g.lineBetween(20,36,40,36);
    g.generateTexture('boss',60,70);
    g.destroy();

    // TORCH
    g = this.make.graphics({x:0,y:0,add:false});
    g.fillStyle(0x4a2800); g.fillRect(5,16,4,16);
    g.fillStyle(0x6b3a00); g.fillRect(3,12,8,8);
    g.fillStyle(0xffcc00); g.fillTriangle(1,14,7,0,13,14);
    g.fillStyle(0xff6600,0.7); g.fillTriangle(3,14,7,4,11,14);
    g.generateTexture('torch',14,32);
    g.destroy();

    // ARISE portal effect
    g = this.make.graphics({x:0,y:0,add:false});
    g.lineStyle(3,0xcc00ff,0.8); g.strokeCircle(24,24,22);
    g.lineStyle(2,0x9900aa,0.5); g.strokeCircle(24,24,16);
    g.lineStyle(1,0xff00ff,0.3); g.strokeCircle(24,24,10);
    g.generateTexture('arise_portal',48,48);
    g.destroy();
  }
}

// ====== GAME SCENE ======
class GameScene extends Phaser.Scene {
  constructor(){ super('Game'); }

  create(){
    gScene = this;
    const W = this.scale.width, H = this.scale.height;
    this.floor = 1;
    this.score = 0; this.kills = 0; this.crystals = 0;
    this.hp = 100; this.maxHP = 100; this.mp = 100; this.maxMP = 100;
    this.soldiers = []; this.sk1CD = 0; this.sk2CD = 0; this.sk3CD = 0;
    this.enemiesKilledThisFloor = 0; this.enemiesForFloor = 8;
    this.enemySpawnCount = 0; this.spawnTimer = 0;
    this.betweenFloors = false; this.lastAttackTime = 0;
    this.ariseTargets = []; this.gameStarted = false; this.gameOver = false;

    // Draw background first so it's not black
    this.add.rectangle(W/2, H/2, W, H, 0x030010);
    // Purple gradient effect
    const g = this.add.graphics();
    g.fillGradientStyle(0x030010, 0x030010, 0x0a0030, 0x0a0030, 1);
    g.fillRect(0, 0, W, H);
    // Pillar decorations
    for(let i=0;i<4;i++){
      const px = (i+0.5)*(W/4);
      g.fillStyle(0x180055, 0.4); g.fillRect(px-15, H*0.15, 30, H*0.7);
      g.fillStyle(0x220066, 0.4); g.fillRect(px-20, H*0.15, 40, 10);
    }

    this.createWorld();
    this.createPlayer();
    this.createGroups();
    this.createEffects();
    this.setupControls();

    // Show start message
    this.showMsg(
      '⚔ SHADOW DUNGEON',
      'ARISE FROM THE SHADOW\n\nA/D or ◀▶ — MOVE\nW / ▲ / SPACE — JUMP\nJ or Z or ⚔ — ATTACK\nQ — SHADOW STRIKE\nE — ARISE (extract shadow)\nR — SHIELD\n\nKill enemies → Press E to ARISE → Build army!\nClear all enemies to reach next floor!',
      '▶ ENTER DUNGEON',
      () => { this.gameStarted = true; this.announceFloor(); this.time.delayedCall(1000, ()=>this.spawnEnemy()); }
    );
  }

  createWorld(){
    const W = this.scale.width, H = this.scale.height;
    this.bg = this.add.graphics();
    this.drawBackground();
    // Torches
    this.torches = [];
    [W*0.15, W*0.5, W*0.85].forEach(tx => {
      const t = this.add.image(tx, H - 120, 'torch').setDepth(1);
      this.torches.push(t);
    });
    // Ground
    this.ground = this.physics.add.staticGroup();
    const groundY = H - 60;
    for(let x = 0; x < W; x += 64){
      const g = this.ground.create(x + 32, groundY + 16, 'ground');
      g.setDisplaySize(64, 32).refreshBody();
    }
    this.platforms = this.physics.add.staticGroup();
    this.spawnPlatforms();
    // Glow line
    const glowLine = this.add.graphics().setDepth(2);
    glowLine.lineStyle(3, 0x7b2fff, 0.8);
    glowLine.lineBetween(0, groundY, W, groundY);
  }

  drawBackground(){
    const W = this.scale.width, H = this.scale.height;
    const g = this.bg;
    g.clear();
    // Sky
    for(let y = 0; y < H; y++){
      const t = y/H;
      const r = Math.floor(3 + t*15);
      const gr = 0;
      const b = Math.floor(16 + t*48);
      g.fillStyle(Phaser.Display.Color.GetColor(r,gr,b));
      g.fillRect(0, y, W, 1);
    }
    // Far pillars
    for(let i = 0; i < 4; i++){
      const px = i * (W/3) + 30;
      g.fillStyle(0x180055, 0.6);
      g.fillRect(px, H*0.2, 30, H*0.6);
      g.fillStyle(0x220066, 0.5);
      g.fillRect(px-5, H*0.2, 40, 10);
      // Runes on pillar
      g.fillStyle(0x4a1880, 0.3);
      for(let r=0;r<3;r++) g.fillRect(px+4, H*0.25+r*50, 22, 6);
    }
    // Ceiling
    g.fillStyle(0x050014, 0.8); g.fillRect(0, 0, W, 20);
  }

  spawnPlatforms(){
    const W = this.scale.width, H = this.scale.height;
    this.platforms.clear(true,true);
    const configs = [
      [W*0.15, H-160, 100],
      [W*0.5-50, H-220, 100],
      [W*0.75, H-170, 100],
    ];
    configs.forEach(([x,y,w]) => {
      for(let px=x; px<x+w; px+=64){
        const p = this.platforms.create(px+32, y, 'platform');
        p.setDisplaySize(64, 20).refreshBody();
      }
    });
  }

  createPlayer(){
    const W = this.scale.width, H = this.scale.height;
    this.player = this.physics.add.sprite(100, H - 120, 'player');
    this.player.setCollideWorldBounds(true).setBounce(0.05).setDepth(10);
    this.player.body.setSize(24, 44).setOffset(4, 4);
    this.playerFacing = 1; this.isAttacking = false;
    this.attackTimer = 0; this.invincible = 0; this.invincibleFlash = 0;
    this.playerGlow = this.add.graphics().setDepth(9);
    this.nameTag = this.add.text(100, H-168, (window.HUNTER_NAME||'HUNTER'), {
      fontSize:'10px', color:'#00aaff', fontFamily:'monospace',
      stroke:'#000033', strokeThickness:3
    }).setOrigin(0.5).setDepth(11);
  }

  createGroups(){
    this.enemies = this.physics.add.group();
    this.drops = this.physics.add.group();
    this.soldierGroup = this.physics.add.group();
    this.particles = this.add.particles(0,0,'particle_blue',{emitting:false});

    // Colliders
    this.physics.add.collider(this.player, this.ground);
    this.physics.add.collider(this.player, this.platforms);
    this.physics.add.collider(this.enemies, this.ground);
    this.physics.add.collider(this.enemies, this.platforms);
    this.physics.add.collider(this.drops, this.ground);
    this.physics.add.collider(this.drops, this.platforms);
    this.physics.add.collider(this.soldierGroup, this.ground);

    // Overlaps
    this.physics.add.overlap(this.player, this.drops, this.collectDrop, null, this);
  }

  createEffects(){
    this.slashGraphics = this.add.graphics().setDepth(15);
    this.arisePortals = [];
  }

  setupControls(){
    this.cursors = this.input.keyboard.createCursorKeys();
    this.wasd = this.input.keyboard.addKeys({
      up: Phaser.Input.Keyboard.KeyCodes.W,
      down: Phaser.Input.Keyboard.KeyCodes.S,
      left: Phaser.Input.Keyboard.KeyCodes.A,
      right: Phaser.Input.Keyboard.KeyCodes.D,
      attack: Phaser.Input.Keyboard.KeyCodes.J,
      attack2: Phaser.Input.Keyboard.KeyCodes.Z,
      skill1: Phaser.Input.Keyboard.KeyCodes.Q,
      skill2: Phaser.Input.Keyboard.KeyCodes.E,
      skill3: Phaser.Input.Keyboard.KeyCodes.R,
    });
    // Prevent page scroll
    this.input.keyboard.on('keydown', e => {
      if([32,37,38,39,40].includes(e.keyCode)) e.preventDefault();
    });
  }

  setupCamera(){
    this.cameras.main.setBackgroundColor(0x030010);
  }

  // ====== SPAWN ENEMY ======
  spawnEnemy(){
    if(!this.gameStarted || this.betweenFloors) return;
    if(this.enemySpawnCount >= this.enemiesForFloor) return;
    const W = this.scale.width, H = this.scale.height;
    const isBossFloor = this.floor % 5 === 0;
    const side = Math.random() < 0.5 ? 0 : W;
    const y = H - 120;

    let enemy, type;
    if(isBossFloor && this.enemySpawnCount === 0){
      type = 'boss';
      enemy = this.enemies.create(W/2, y - 20, 'boss');
      enemy.setDepth(8);
      enemy.hp = 50 + this.floor * 10; enemy.maxHP = enemy.hp;
      enemy.speed = 60; enemy.score = 200;
      enemy.isBoss = true;
      enemy.body.setSize(50,60).setOffset(5,10);
      this.showFloatText(W/2, 200, '👑 BOSS APPEARS!', '#ff0000', true);
    } else {
      const rand = Math.random();
      if(rand < 0.5 || this.floor < 2){ type='grunt'; }
      else if(rand < 0.75 || this.floor < 4){ type='heavy'; }
      else { type='elite'; }
      const texMap = {grunt:'enemy_grunt',heavy:'enemy_heavy',elite:'enemy_elite'};
      const hpMap = {grunt:3+this.floor, heavy:8+this.floor*2, elite:5+this.floor};
      const spMap = {grunt:80+this.floor*10, heavy:50+this.floor*5, elite:120+this.floor*12};
      const scMap = {grunt:10, heavy:25, elite:30};
      enemy = this.enemies.create(side < 10 ? 20 : W-20, y, texMap[type]);
      enemy.setDepth(8);
      enemy.hp = hpMap[type]; enemy.maxHP = enemy.hp;
      enemy.speed = spMap[type]; enemy.score = scMap[type];
      enemy.type = type;
      enemy.body.setCollideWorldBounds(true);
    }

    enemy.canArise = false;
    enemy.ariseTimer = 0;
    enemy.attackCooldown = 0;
    enemy.hpBar = this.createHPBar(enemy);
    this.enemySpawnCount++;

    // Spawn FX
    this.emitParticles(enemy.x, enemy.y, 'particle_purple', 10, 120);
  }

  createHPBar(enemy){
    const bar = this.add.graphics().setDepth(12);
    this.updateHPBar(bar, enemy);
    return bar;
  }

  updateHPBar(bar, enemy){
    if(!bar || !enemy || !enemy.active) return;
    bar.clear();
    const w = (enemy.isBoss ? 60 : 36);
    const bx = enemy.x - w/2, by = enemy.y - (enemy.isBoss?50:26);
    bar.fillStyle(0x000000, 0.7); bar.fillRect(bx, by, w, 5);
    const ratio = Math.max(0, enemy.hp/enemy.maxHP);
    bar.fillStyle(enemy.isBoss ? 0xff0000 : 0x9933ff); bar.fillRect(bx, by, w*ratio, 5);
    // ARISE indicator
    if(enemy.canArise && enemy.ariseTimer > 0){
      const pulse = 0.6 + Math.sin(this.time.now*0.005)*0.4;
      bar.fillStyle(0xcc00ff, pulse); bar.fillRect(bx-2, by-8, w+4, 6);
      bar.fillStyle(0xffffff, pulse); bar.fillRect(bx, by-6, (w)*(enemy.ariseTimer/180), 2);
    }
  }

  // ====== UPDATE ======
  update(time, delta){
    if(!this.gameStarted || this.betweenFloors || this.gameOver) return;
    const dt = delta/16.67;

    this.handlePlayer(dt);
    this.handleEnemies(dt, time);
    this.handleSoldiers(dt);
    this.updateCooldowns(dt);
    this.updateSlashFX();
    this.updateNameTag();
    this.checkFloorClear();
    this.handleSpawning(time);
    this.updateHUD();
  }

  handlePlayer(dt){
    const p = this.player;
    const onGround = p.body.touching.down || p.body.blocked.down;
    const left = this.cursors.left.isDown || this.wasd.left.isDown || gMobileKeys.left;
    const right = this.cursors.right.isDown || this.wasd.right.isDown || gMobileKeys.right;
    const jump = this.cursors.up.isDown || this.wasd.up.isDown || gMobileKeys.up;
    const attack = Phaser.Input.Keyboard.JustDown(this.wasd.attack) || Phaser.Input.Keyboard.JustDown(this.wasd.attack2);
    const sk1 = Phaser.Input.Keyboard.JustDown(this.wasd.skill1);
    const sk2 = Phaser.Input.Keyboard.JustDown(this.wasd.skill2);
    const sk3 = Phaser.Input.Keyboard.JustDown(this.wasd.skill3);

    if(!this.isAttacking){
      if(left){ p.setVelocityX(-160); this.playerFacing=-1; p.setFlipX(true); }
      else if(right){ p.setVelocityX(160); this.playerFacing=1; p.setFlipX(false); }
      else p.setVelocityX(p.body.velocity.x * 0.8);
    }

    if(jump && onGround) p.setVelocityY(-520);
    if(attack) this.doAttack();
    if(sk1) this.useSkill(1);
    if(sk2) this.useSkill(2);
    if(sk3) this.useSkill(3);

    // Invincible flash
    if(this.invincible > 0){
      this.invincible -= 1;
      this.invincibleFlash++;
      p.setAlpha(Math.floor(this.invincibleFlash/4)%2===0 ? 0.3 : 1);
    } else p.setAlpha(1);

    // Attack timer
    if(this.attackTimer > 0){
      this.attackTimer--;
      if(this.attackTimer === 0){
        this.isAttacking = false;
        p.setTexture('player');
      }
    }

    // Player glow
    this.playerGlow.clear();
    if(this.invincible > 60){
      this.playerGlow.lineStyle(2, 0x00d4ff, 0.5);
      this.playerGlow.strokeCircle(p.x, p.y, 28);
    }
    this.playerGlow.fillStyle(0x0044ff, 0.04);
    this.playerGlow.fillCircle(p.x, p.y, 24);

    // Check death
    if(this.hp <= 0 && !this.gameOver){ this.gameOver = true; this.onDeath(); }
  }

  handleEnemies(dt, time){
    this.enemies.getChildren().forEach(e => {
      if(!e.active) return;

      // Move toward player
      const dx = this.player.x - e.x;
      const dir = dx > 0 ? 1 : -1;
      e.setFlipX(dir < 0);

      if(Math.abs(dx) > 30 && !e.stunned) e.setVelocityX(e.speed * dir);
      else e.setVelocityX(0);

      // Boss extra behavior - jump
      if(e.isBoss && e.body.blocked.down && Math.random() < 0.008) e.setVelocityY(-400);

      // Attack player
      if(this.invincible === 0){
        const dist = Phaser.Math.Distance.Between(e.x, e.y, this.player.x, this.player.y);
        if(dist < 40 && e.attackCooldown <= 0){
          this.takeDamage(5 + this.floor + (e.isBoss?10:0));
          e.attackCooldown = 90;
          // Knockback
          this.player.setVelocityX(dir * 200);
        }
      }
      if(e.attackCooldown > 0) e.attackCooldown--;

      // ARISE timer countdown
      if(e.canArise) e.ariseTimer = Math.max(0, e.ariseTimer - 1);

      // Update HP bar
      this.updateHPBar(e.hpBar, e);
    });
  }

  handleSoldiers(dt){
    this.soldiers.forEach((s,i) => {
      if(!s.active) return;
      // Find nearest enemy
      let nearest = null, nearDist = 200;
      this.enemies.getChildren().forEach(e => {
        if(!e.active) return;
        const d = Phaser.Math.Distance.Between(s.x, s.y, e.x, e.y);
        if(d < nearDist){ nearest = e; nearDist = d; }
      });
      if(nearest){
        const dx = nearest.x - s.x;
        s.setVelocityX(dx > 0 ? 120 : -120);
        s.setFlipX(dx < 0);
        if(nearDist < 35){
          s.setVelocityX(0);
          if(!s.attackCD || s.attackCD <= 0){
            nearest.hp -= 1.5;
            s.attackCD = 40;
            this.emitParticles(nearest.x, nearest.y, 'particle_purple', 3, 80);
            if(nearest.hp <= 0) this.killEnemy(nearest);
          }
        }
      } else {
        // Follow player
        const dx = this.player.x - s.x + (i-1)*40;
        s.setVelocityX(dx > 0 ? 80 : -80);
        s.setFlipX(dx < 0);
      }
      if(s.attackCD > 0) s.attackCD--;
    });
  }

  doAttack(){
    const now = this.time.now;
    if(now - this.lastAttackTime < 350) return;
    this.lastAttackTime = now;
    this.isAttacking = true;
    this.attackTimer = 14;
    this.player.setTexture('player_attack');
    if(this.playerFacing < 0) this.player.setFlipX(true); else this.player.setFlipX(false);

    // Slash FX
    this.doSlashFX();

    // Hit enemies in range
    const px = this.player.x, py = this.player.y;
    const range = 65, facing = this.playerFacing;
    let hit = false;
    this.enemies.getChildren().forEach(e => {
      if(!e.active) return;
      const inRange = facing > 0 ? (e.x > px && e.x < px+range) : (e.x < px && e.x > px-range);
      const inHeight = Math.abs(e.y - py) < 50;
      if(inRange && inHeight){
        e.hp -= 4 + this.floor;
        this.showFloatText(e.x, e.y-20, '-'+(4+this.floor), '#ffffff');
        this.emitParticles(e.x, e.y, 'particle_blue', 6, 100);
        e.setVelocityX(facing * 150); // knockback
        hit = true;
        if(e.hp <= 0) this.killEnemy(e);
      }
    });
    if(!hit) this.emitParticles(px + facing*40, py, 'particle_blue', 3, 80);
  }

  doSlashFX(){
    const p = this.player;
    const g = this.slashGraphics;
    g.clear();
    // Draw slash arcs
    for(let i=0;i<4;i++){
      g.lineStyle(3-i*0.5, this.playerFacing>0?0x00d4ff:0x88ccff, 0.8-i*0.15);
      g.beginPath();
      if(this.playerFacing > 0) g.arc(p.x+10,p.y,20+i*10,-0.8,0.8,false);
      else g.arc(p.x-10,p.y,20+i*10,Math.PI-0.8,Math.PI+0.8,true);
      g.strokePath();
    }
    // Clear after short delay
    this.time.delayedCall(120, () => g.clear());
  }

  useSkill(n){
    if(n===1){
      if(this.sk1CD > 0){ this.showFloatText(this.player.x, this.player.y-50, 'COOLDOWN!', '#888', false); return; }
      if(this.mp < 20){ this.showFloatText(this.player.x, this.player.y-50, 'LOW MANA!', '#ff6600', false); return; }
      this.mp -= 20; this.sk1CD = 120;
      // Shadow Strike - wide powerful slash
      const px = this.player.x, py = this.player.y, f = this.playerFacing;
      const g = this.slashGraphics;
      g.clear();
      for(let i=0;i<6;i++){
        g.lineStyle(4-i*0.5, 0x9933ff, 0.9-i*0.1);
        g.beginPath();
        if(f>0) g.arc(px+10,py,30+i*12,-0.9,0.9,false);
        else g.arc(px-10,py,30+i*12,Math.PI-0.9,Math.PI+0.9,true);
        g.strokePath();
      }
      this.time.delayedCall(200, () => g.clear());
      this.enemies.getChildren().forEach(e => {
        if(!e.active) return;
        const inRange = f>0?(e.x>px&&e.x<px+100):(e.x<px&&e.x>px-100);
        if(inRange && Math.abs(e.y-py)<60){
          e.hp -= 12+this.floor*2;
          this.showFloatText(e.x,e.y-20,'⚡'+(12+this.floor*2),'#9933ff');
          this.emitParticles(e.x,e.y,'particle_purple',12,120);
          e.setVelocityX(f*300);
          if(e.hp<=0) this.killEnemy(e);
        }
      });
      this.showFloatText(px,py-50,'SHADOW STRIKE!','#9933ff',true);
      this.cameras.main.shake(200, 0.01);

    } else if(n===2){
      if(this.sk2CD > 0){ this.showFloatText(this.player.x, this.player.y-50, 'COOLDOWN!', '#888', false); return; }
      if(this.mp < 25){ this.showFloatText(this.player.x, this.player.y-50, 'LOW MANA!', '#ff6600', false); return; }
      // ARISE - find nearest canArise enemy
      let target = null, minDist = 9999;
      this.enemies.getChildren().forEach(e => {
        if(!e.active && e.canArise && e.ariseTimer > 0){
          const d = Phaser.Math.Distance.Between(this.player.x, this.player.y, e.x, e.y);
          if(d < minDist){ minDist = d; target = e; }
        }
      });
      // Also check recently killed (stored in ariseTargets)
      this.ariseTargets.forEach(t => {
        if(t.timer > 0){
          const d = Phaser.Math.Distance.Between(this.player.x, this.player.y, t.x, t.y);
          if(d < minDist){ minDist = d; target = t; }
        }
      });
      if(!target){ this.showFloatText(this.player.x, this.player.y-50, 'NO SHADOW NEARBY!\nKill enemies first!', '#cc00ff', false); return; }
      this.mp -= 25; this.sk2CD = 200;
      this.doArise(target.x||target.x, target.y||target.y);

    } else if(n===3){
      if(this.sk3CD > 0){ this.showFloatText(this.player.x, this.player.y-50, 'COOLDOWN!', '#888', false); return; }
      if(this.mp < 15){ this.showFloatText(this.player.x, this.player.y-50, 'LOW MANA!', '#ff6600', false); return; }
      this.mp -= 15; this.sk3CD = 180;
      this.invincible = 150;
      this.showFloatText(this.player.x, this.player.y-50, '🛡 SHADOW SHIELD!', '#00d4ff', true);
      this.emitParticles(this.player.x, this.player.y, 'particle_blue', 20, 200);
    }
  }

  doArise(x, y){
    if(this.soldiers.length >= gMaxSoldiers){
      // Remove oldest
      const old = this.soldiers.shift();
      if(old && old.active){ old.hpBar && old.hpBar.destroy(); old.destroy(); }
    }
    // Arise portal FX
    const portal = this.add.image(x, y, 'arise_portal').setDepth(16).setAlpha(0);
    this.tweens.add({targets:portal, alpha:{from:0,to:1}, scale:{from:0,to:2}, duration:300, yoyo:true, onComplete:()=>portal.destroy()});
    // Dark flash
    this.cameras.main.flash(300, 40, 0, 60, false);
    // Create soldier
    const s = this.soldierGroup.create(x, y-20, 'soldier').setDepth(9);
    s.setBounce(0.2).setCollideWorldBounds(true);
    s.hp = 30 + this.floor*3; s.maxHP = s.hp;
    s.attackCD = 0;
    s.hpBar = this.add.graphics().setDepth(13);
    this.soldiers.push(s);
    this.showFloatText(x, y-40, '☠ ARISE!', '#cc00ff', true);
    this.emitParticles(x, y, 'particle_purple', 25, 300);
    this.cameras.main.shake(400, 0.015);
    // Remove from ariseTargets
    this.ariseTargets = this.ariseTargets.filter(t => !(Math.abs(t.x-x)<40 && Math.abs(t.y-y)<40));
    this.updateSoldierHPBars();
  }

  updateSoldierHPBars(){
    this.soldiers.forEach(s => {
      if(!s || !s.active) return;
      const bar = s.hpBar;
      if(!bar) return;
      bar.clear();
      bar.fillStyle(0x000000,0.7); bar.fillRect(s.x-10, s.y-22, 20, 4);
      bar.fillStyle(0xcc00ff); bar.fillRect(s.x-10, s.y-22, 20*(s.hp/s.maxHP), 4);
    });
  }

  killEnemy(e){
    if(!e.active) return;
    this.kills++;
    this.score += e.score * this.floor;
    this.crystals += e.isBoss ? 10 : Math.ceil(Math.random()*3);
    // Drop crystals
    const numDrops = e.isBoss ? 5 : Math.ceil(Math.random()*2);
    for(let i=0;i<numDrops;i++){
      const d = this.drops.create(e.x + Phaser.Math.Between(-20,20), e.y, 'crystal');
      d.setVelocity(Phaser.Math.Between(-80,80), Phaser.Math.Between(-150,-50));
      d.setBounce(0.4).setCollideWorldBounds(true);
      d.type = 'crystal'; d.val = 1;
    }
    // HP drop chance
    if(Math.random() < 0.1 || e.isBoss){
      const h = this.drops.create(e.x, e.y, 'hpdrop');
      h.setVelocity(0, -100).setBounce(0.3);
      h.type = 'hp'; h.val = e.isBoss ? 30 : 15;
    }
    // Store for ARISE
    this.ariseTargets.push({x:e.x, y:e.y, timer:180});
    this.time.delayedCall(180*16, () => {
      this.ariseTargets = this.ariseTargets.filter(t=>t.timer>0);
    });
    // Countdown timer for ARISE targets
    const ar = this.ariseTargets[this.ariseTargets.length-1];
    const arTimer = this.time.addEvent({delay:16, repeat:179, callback:()=>{ if(ar) ar.timer--; }});

    this.showFloatText(e.x, e.y-20, '+'+e.score*this.floor, '#ffd700');
    // ARISE hint
    this.showFloatText(e.x, e.y-40, '☠ PRESS E', '#cc00ff');
    this.emitParticles(e.x, e.y, 'particle_purple', 15, 200);
    this.emitParticles(e.x, e.y, 'particle_gold', 8, 150);
    if(e.isBoss){
      this.cameras.main.shake(500, 0.025);
      this.cameras.main.flash(400, 80, 0, 0, false);
      this.showFloatText(e.x, e.y-60, '👑 BOSS SLAIN!', '#ffd700', true);
    }
    e.hpBar && e.hpBar.destroy();
    e.destroy();
    this.enemiesKilledThisFloor++;
    this.checkFloorClear();
  }

  takeDamage(amt){
    if(this.invincible > 0) return;
    this.hp = Math.max(0, this.hp - amt);
    this.invincible = 60;
    this.cameras.main.shake(150, 0.012);
    this.cameras.main.flash(100, 80, 0, 0, false);
    this.emitParticles(this.player.x, this.player.y, 'particle_red', 8, 100);
    this.showFloatText(this.player.x, this.player.y-30, '-'+amt, '#ff3366');
  }

  collectDrop(player, drop){
    if(!drop.active) return;
    if(drop.type === 'crystal'){
      this.crystals += drop.val;
      this.showFloatText(drop.x, drop.y, '💎+'+drop.val, '#00d4ff');
    } else if(drop.type === 'hp'){
      this.hp = Math.min(this.maxHP, this.hp + drop.val);
      this.showFloatText(drop.x, drop.y, '❤+'+drop.val, '#ff6688');
    }
    this.emitParticles(drop.x, drop.y, 'particle_blue', 4, 60);
    drop.destroy();
  }

  checkFloorClear(){
    if(this.betweenFloors) return;
    if(this.enemiesKilledThisFloor >= this.enemiesForFloor && this.enemies.countActive() === 0){
      this.betweenFloors = true;
      this.time.delayedCall(800, () => this.nextFloor());
      this.showFloatText(this.scale.width/2, this.scale.height/2 - 30, 'FLOOR CLEARED! ⭐', '#ffd700', true);
      this.cameras.main.flash(500, 60, 40, 0, false);
      // Crystals bonus
      const bonus = 5 * this.floor;
      this.crystals += bonus;
      this.showFloatText(this.scale.width/2, this.scale.height/2 + 10, '💎+'+bonus+' BONUS', '#00d4ff', false);
    }
  }

  nextFloor(){
    this.floor++;
    this.enemiesKilledThisFloor = 0;
    this.enemySpawnCount = 0;
    this.enemiesForFloor = 8 + this.floor * 2;
    this.spawnTimer = 0;
    this.ariseTargets = [];
    // MP restore on floor clear
    this.mp = Math.min(this.maxMP, this.mp + 30);
    // Respawn platforms
    this.spawnPlatforms();
    this.betweenFloors = false;
    this.announceFloor();
    // Small HP restore
    this.hp = Math.min(this.maxHP, this.hp + 10);
    this.time.delayedCall(1500, () => this.spawnEnemy());
  }

  handleSpawning(time){
    if(this.betweenFloors || !this.gameStarted) return;
    if(this.enemySpawnCount >= this.enemiesForFloor) return;
    this.spawnTimer++;
    const interval = Math.max(120, 280 - this.floor*15);
    if(this.spawnTimer >= interval && this.enemies.countActive() < 4){
      this.spawnTimer = 0;
      this.spawnEnemy();
    }
  }

  updateCooldowns(dt){
    if(this.sk1CD > 0){ this.sk1CD--; this.updateSkillUI(1, this.sk1CD, 120); }
    else this.updateSkillUI(1, 0, 120);
    if(this.sk2CD > 0){ this.sk2CD--; this.updateSkillUI(2, this.sk2CD, 200); }
    else this.updateSkillUI(2, 0, 200);
    if(this.sk3CD > 0){ this.sk3CD--; this.updateSkillUI(3, this.sk3CD, 180); }
    else this.updateSkillUI(3, 0, 180);
    // MP regen
    if(this.mp < this.maxMP) this.mp = Math.min(this.maxMP, this.mp + 0.05*dt);
    // Update ARISE targets
    this.ariseTargets = this.ariseTargets.filter(t=>t.timer>0);
    // Update soldier HP bars
    this.updateSoldierHPBars();
    this.soldiers = this.soldiers.filter(s=>s&&s.active);
  }

  updateSkillUI(n, cd, maxCD){
    const btn = document.getElementById('sk'+n);
    const cdEl = document.getElementById('sk'+n+'-cd');
    if(!btn||!cdEl) return;
    if(cd > 0){
      btn.classList.add('cd');
      cdEl.style.display='flex';
      cdEl.textContent = Math.ceil(cd/60)+'s';
    } else {
      btn.classList.remove('cd');
      cdEl.style.display='none';
    }
  }

  updateSlashFX(){
    // Fade out over time
  }

  updateNameTag(){
    this.nameTag.setPosition(this.player.x, this.player.y - 30);
  }

  announceFloor(){
    const el = document.getElementById('floor-announce');
    const t = document.getElementById('floor-title');
    const s = document.getElementById('floor-sub');
    t.textContent = 'FLOOR ' + this.floor;
    const isBoss = this.floor % 5 === 0;
    s.textContent = isBoss ? '👑 BOSS FLOOR' : ['ARISE FROM THE SHADOW','FACE THE DARKNESS','SHADOW DESCENDS','ARISE OR PERISH'][Math.min(this.floor-1,3)];
    if(isBoss){ t.style.color='#ff4444'; el.style.textShadow='0 0 30px #ff0000'; }
    else { t.style.color='#ffd700'; el.style.textShadow='0 0 30px #ffd700'; }
    el.style.opacity='1';
    setTimeout(()=>{ el.style.opacity='0'; }, 2500);
  }

  emitParticles(x, y, texture, count, lifespan){
    for(let i=0;i<count;i++){
      const p = this.add.image(x, y, texture).setDepth(20).setScale(0.8);
      const angle = Math.random()*Math.PI*2;
      const speed = 40+Math.random()*100;
      const vx = Math.cos(angle)*speed, vy = Math.sin(angle)*speed - 50;
      this.tweens.add({
        targets:p, x:x+vx*(lifespan/60), y:y+vy*(lifespan/60),
        alpha:{from:1,to:0}, scale:{from:0.8,to:0.1},
        duration:lifespan, ease:'Power2',
        onComplete:()=>p.destroy()
      });
    }
  }

  showFloatText(x, y, text, color, big=false){
    const t = this.add.text(x, y, text, {
      fontSize: big?'16px':'11px', color, fontFamily:'monospace',
      stroke:'#000000', strokeThickness:3
    }).setOrigin(0.5).setDepth(25);
    this.tweens.add({targets:t, y:y-50, alpha:{from:1,to:0}, duration:big?1200:900, ease:'Power1', onComplete:()=>t.destroy()});
  }

  updateHUD(){
    document.getElementById('h-floor').textContent = this.floor;
    document.getElementById('h-score').textContent = this.score;
    document.getElementById('h-kills').textContent = this.kills;
    document.getElementById('h-crystals').textContent = this.crystals;
    document.getElementById('h-soldiers').textContent = this.soldiers.filter(s=>s&&s.active).length + '/' + gMaxSoldiers;
    document.getElementById('hp-fill').style.width = Math.max(0,(this.hp/this.maxHP)*100)+'%';
    document.getElementById('mp-fill').style.width = Math.max(0,(this.mp/this.maxMP)*100)+'%';
    const hpBar = document.getElementById('hp-fill');
    const hpPct = this.hp/this.maxHP;
    hpBar.style.background = hpPct > 0.5 ? 'linear-gradient(90deg,#cc0033,#ff3366)' : hpPct > 0.25 ? 'linear-gradient(90deg,#cc6600,#ffaa00)' : '#ff0000';
  }

  onDeath(){
    const xpEarned = Math.floor(this.score/4) + (this.floor-1)*15;
    const crystalEarned = this.crystals;
    // Save to Life System
    if(window.LIFE_SYSTEM_SAVE){
      window.LIFE_SYSTEM_SAVE(xpEarned, crystalEarned, this.floor, this.score, this.kills);
    }
    const best = parseInt(localStorage.getItem('shadow_dungeon_best')||'0');
    if(this.score > best) localStorage.setItem('shadow_dungeon_best', this.score);
    this.showMsg(
      'DEFEATED',
      `FLOOR REACHED: ${this.floor}\nKILLS: ${this.kills}\nSCORE: ${this.score}\nCRYSTALS: 💎${this.crystals}\n\n+${xpEarned} XP EARNED\n+💎${crystalEarned} SAVED TO LIFE SYSTEM`,
      'TRY AGAIN',
      () => this.scene.restart()
    );
  }

  showMsg(title, sub, btnText, action){
    const box = document.getElementById('msg-box');
    document.getElementById('msg-title').textContent = title;
    document.getElementById('msg-sub').textContent = sub;
    document.getElementById('msg-btn').textContent = btnText;
    box.style.display = 'block';
    gMsgAction = action;
  }
}

function msgAction(){
  document.getElementById('msg-box').style.display='none';
  if(gMsgAction){ gMsgAction(); gMsgAction=null; }
}

// ====== Life System integration ======
window.HUNTER_NAME = localStorage.getItem('hunterName') || 'HUNTER';
try{
  const saved = JSON.parse(localStorage.getItem('liferpg')||'null');
  if(saved && saved.hunterName) window.HUNTER_NAME = saved.hunterName;
}catch(e){}

window.LIFE_SYSTEM_SAVE = function(xp, crystals, floor, score, kills){
  try{
    const saved = JSON.parse(localStorage.getItem('liferpg')||'null');
    if(saved){
      saved.xp = (saved.xp||0) + xp;
      saved.totalXP = (saved.totalXP||0) + xp;
      saved.crystals = (saved.crystals||0) + crystals;
      const today = new Date().toISOString().split('T')[0];
      if(!saved.dailyScores) saved.dailyScores={};
      saved.dailyScores[today]=(saved.dailyScores[today]||0)+xp;
      // Add history entry
      if(!saved.history) saved.history=[];
      const now=new Date();
      const t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
      saved.history.unshift({time:t,msg:'🎮 DUNGEON FLOOR '+floor+' ('+kills+' kills)',xp:'+'+xp+' XP',type:'intelligence'});
      if(saved.history.length>30) saved.history.pop();
      localStorage.setItem('liferpg', JSON.stringify(saved));
    }
  }catch(e){ console.log('Life System save error:', e); }
};

// ====== START ======
gGame = new Phaser.Game(config);

// Prevent context menu on long press mobile
document.addEventListener('contextmenu', e => e.preventDefault());
</script>
